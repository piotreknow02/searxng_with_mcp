# Read the documentation before extending the defaults:
# https://docs.searxng.org/admin/settings/

use_default_settings: true

server:
  secret_key: "ultrasecretkey"
  image_proxy: true

  # This is unnecesary when running locally
  # + needs a valkey instance which is usually another container
  limiter: false

search:
  formats:
    - html
    - json
    - csv
    - rss
